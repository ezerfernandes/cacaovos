<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>🥚 Easter Egg Hunt</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:Arial,sans-serif; }
#video { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:0; }
canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }
#hud {
  position:fixed; top:0; left:0; right:0;
  display:flex; justify-content:space-between;
  padding:14px 16px; z-index:10;
  background:linear-gradient(to bottom,rgba(0,0,0,0.5),transparent);
  pointer-events:none;
}
.pill {
  background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.4);
  border-radius:999px; padding:7px 18px; color:#fff;
  font-size:18px; font-weight:bold;
  text-shadow:0 1px 3px rgba(0,0,0,0.5); backdrop-filter:blur(6px);
}
#timerEl.urgent { border-color:#ff4444; color:#ff8888; animation:blink .5s infinite alternate; }
@keyframes blink { to { opacity:.4; } }

#crosshair {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:48px; height:48px; z-index:9; pointer-events:none;
}
#crosshair::before, #crosshair::after {
  content:''; position:absolute; background:rgba(255,255,255,0.8); border-radius:2px;
}
#crosshair::before { width:2px; height:100%; left:50%; top:0; transform:translateX(-50%); }
#crosshair::after  { height:2px; width:100%; top:50%; left:0; transform:translateY(-50%); }

#toast {
  position:fixed; top:40%; left:50%; transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.93); border-radius:20px;
  padding:12px 28px; font-size:24px; font-weight:bold; color:#333;
  z-index:20; pointer-events:none; opacity:0; transition:opacity .25s;
}

/* Splash */
#splash {
  position:fixed; inset:0; z-index:100;
  background:linear-gradient(135deg,#a8edea,#fed6e3);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; text-align:center; padding:28px;
}
#splash h1 { font-size:34px; color:#444; }
#splash p  { font-size:15px; color:#666; max-width:300px; line-height:1.5; }
#splash .big { font-size:52px; }
#startBtn {
  margin-top:8px; background:linear-gradient(135deg,#f093fb,#f5576c);
  color:#fff; border:none; border-radius:30px;
  padding:16px 44px; font-size:20px; font-weight:bold;
  cursor:pointer; box-shadow:0 4px 15px rgba(245,87,108,.4);
}

/* End */
#endScreen {
  position:fixed; inset:0; z-index:100;
  background:linear-gradient(135deg,#a8edea,#fed6e3);
  display:none; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; text-align:center; padding:28px;
}
#endScreen h1 { font-size:34px; color:#444; }
#finalScore   { font-size:64px; font-weight:bold; color:#f5576c; }
#endMsg       { font-size:16px; color:#666; }
#restartBtn {
  background:linear-gradient(135deg,#43e97b,#38f9d7);
  color:#fff; border:none; border-radius:30px;
  padding:16px 44px; font-size:20px; font-weight:bold;
  cursor:pointer; box-shadow:0 4px 15px rgba(67,233,123,.4);
}

#gyroBtn {
  margin-top:4px; background:rgba(255,255,255,0.3);
  border:2px solid rgba(255,255,255,0.6); color:#555;
  border-radius:30px; padding:12px 32px; font-size:16px;
  font-weight:bold; cursor:pointer;
}
</style>
</head>
<body>

<div id="splash">
  <div class="big">🥚🐰🌸</div>
  <h1>Easter Egg Hunt!</h1>
  <p>Point your camera around the room. Eggs are hidden in different directions — pan around to find them all!</p>
  <p style="font-size:13px;color:#999">Tip: Look left, right, up and down!</p>
  <button id="startBtn">Start Hunt 🐰</button>
  <button id="gyroBtn" style="display:none">Enable Motion Sensors 📱</button>
</div>

<div id="endScreen">
  <div style="font-size:52px">🏆</div>
  <h1>Time's Up!</h1>
  <div id="finalScore">0 / 10</div>
  <div id="endMsg"></div>
  <button id="restartBtn">Play Again 🥚</button>
</div>

<div id="hud">
  <div class="pill">🥚 <span id="scoreEl">0</span>/10</div>
  <div class="pill" id="timerEl">⏱ <span id="timeEl">60</span>s</div>
</div>

<div id="crosshair"></div>
<div id="toast"></div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
// ── Config ──────────────────────────────────────────────
const TOTAL = 10, GAME_SECS = 60;
const EGG_COLORS  = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6FC8','#FF9A3C','#C77DFF','#00CFD5','#FF4D6D','#B5E48C'];
const STRIPE_COLS = ['#fff','#fff','#fff','#fff','#fff','#fff','#fff','#fff','#fff','#fff'];
const MSGS = ['🎉 Found one!','✨ Nice!','🐰 Got it!','🌟 Yes!','💛 Sweet!','🎊 Woohoo!'];
const FOV_H = 60; // horizontal field of view in degrees

// ── State ────────────────────────────────────────────────
let eggs = [], score = 0, timeLeft = GAME_SECS, timerInt, gameActive = false;
let yaw = 0, pitch = 0;          // current phone orientation (degrees)
let lastAlpha = null;

// ── Canvas / sizing ──────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ── Camera ───────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
    });
    document.getElementById('video').srcObject = stream;
  } catch(e) {
    alert('Camera access denied. Please allow camera in Safari Settings.');
  }
}

// ── Device Orientation ───────────────────────────────────
function onOrientation(e) {
  // alpha = compass heading (0-360), beta = front-back tilt, gamma = side tilt
  let alpha = e.alpha ?? 0;
  let beta  = e.beta  ?? 0;

  // Smooth alpha (compass) — handle 360→0 wrap
  if (lastAlpha !== null) {
    let delta = alpha - lastAlpha;
    if (delta >  180) delta -= 360;
    if (delta < -180) delta += 360;
    yaw = (yaw + delta * 0.8 + 360) % 360;
  }
  lastAlpha = alpha;

  // pitch: 0 = horizontal, positive = looking up
  pitch = Math.max(-60, Math.min(60, -(beta - 90)));
}

function requestGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') {
        window.addEventListener('deviceorientation', onOrientation, true);
        document.getElementById('gyroBtn').style.display = 'none';
      }
    }).catch(console.error);
  } else {
    window.addEventListener('deviceorientation', onOrientation, true);
  }
}

// ── Eggs ─────────────────────────────────────────────────
function spawnEggs() {
  eggs = [];
  for (let i = 0; i < TOTAL; i++) {
    // spread evenly around compass + random pitch
    const eggYaw   = (i * (360 / TOTAL) + Math.random() * 20 - 10 + 360) % 360;
    const eggPitch = (Math.random() * 50) - 20; // -20 to +30 degrees
    eggs.push({
      yaw: eggYaw, pitch: eggPitch,
      color: EGG_COLORS[i],
      stripe: STRIPE_COLS[i],
      collected: false,
      scale: 1,
      opacity: 1,
      bobOffset: Math.random() * Math.PI * 2,
    });
  }
}

// ── Project egg to screen ────────────────────────────────
function project(egg) {
  const FOV_V = FOV_H * (H / W);

  let dYaw = egg.yaw - yaw;
  if (dYaw >  180) dYaw -= 360;
  if (dYaw < -180) dYaw += 360;

  const dPitch = egg.pitch - pitch;

  // Only draw if within ~1.5x FOV
  if (Math.abs(dYaw) > FOV_H || Math.abs(dPitch) > FOV_V) return null;

  const sx = W/2 + (dYaw   / FOV_H) * W/2;
  const sy = H/2 - (dPitch / FOV_V) * H/2;

  // Distance factor for size (eggs further to edge = slightly smaller)
  const dist = Math.sqrt(dYaw*dYaw + dPitch*dPitch);
  const maxDist = Math.sqrt(FOV_H*FOV_H + FOV_V*FOV_V);
  const sizeFactor = 1 - 0.3 * (dist / maxDist);

  return { sx, sy, sizeFactor };
}

// ── Draw egg ─────────────────────────────────────────────
function drawEgg(egg, sx, sy, sizeFactor, t) {
  const bob = Math.sin(t * 1.8 + egg.bobOffset) * 5;
  const ry = sy + bob;
  const rw = 44 * sizeFactor * egg.scale;
  const rh = 60 * sizeFactor * egg.scale;

  ctx.save();
  ctx.globalAlpha = egg.opacity;
  ctx.translate(sx, ry);

  // Shadow
  ctx.save();
  ctx.globalAlpha = egg.opacity * 0.25;
  ctx.scale(1, 0.3);
  ctx.beginPath();
  ctx.ellipse(0, rh * 0.55, rw * 0.7, rh * 0.25, 0, 0, Math.PI*2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.restore();

  // Body
  ctx.beginPath();
  ctx.ellipse(0, 0, rw/2, rh/2, 0, 0, Math.PI*2);
  const grad = ctx.createRadialGradient(-rw*0.2, -rh*0.2, 1, 0, 0, rw*0.8);
  grad.addColorStop(0, lighten(egg.color, 60));
  grad.addColorStop(1, egg.color);
  ctx.fillStyle = grad;
  ctx.fill();

  // Stripe
  ctx.save();
  ctx.clip();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillRect(-rw, -rh*0.12, rw*2, rh*0.24);
  ctx.restore();

  // Shine
  ctx.beginPath();
  ctx.ellipse(-rw*0.15, -rh*0.22, rw*0.18, rh*0.1, -0.5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fill();

  // Outline
  ctx.beginPath();
  ctx.ellipse(0, 0, rw/2, rh/2, 0, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.restore();
}

function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16)+amt;
  let g = parseInt(hex.slice(3,5),16)+amt;
  let b = parseInt(hex.slice(5,7),16)+amt;
  r=Math.min(255,r); g=Math.min(255,g); b=Math.min(255,b);
  return `rgb(${r},${g},${b})`;
}

// ── Hit test ─────────────────────────────────────────────
function hitTest() {
  const cx = W/2, cy = H/2;
  const t = performance.now()/1000;
  for (let egg of eggs) {
    if (egg.collected) continue;
    const p = project(egg);
    if (!p) continue;
    const bob = Math.sin(t * 1.8 + egg.bobOffset) * 5;
    const rw = 44 * p.sizeFactor, rh = 60 * p.sizeFactor;
    const dx = cx - p.sx, dy = cy - (p.sy + bob);
    if ((dx*dx)/(rw*rw) + (dy*dy)/(rh*rh) < 1.2) {
      collectEgg(egg);
      return;
    }
  }
}

function collectEgg(egg) {
  if (!gameActive || egg.collected) return;
  egg.collected = true;
  score++;
  document.getElementById('scoreEl').textContent = score;
  showToast(MSGS[Math.floor(Math.random()*MSGS.length)]);

  // Pop then fade
  let t0 = performance.now();
  function pop() {
    const elapsed = (performance.now()-t0)/1000;
    egg.scale   = 1 + elapsed * 4;
    egg.opacity = Math.max(0, 1 - elapsed * 3);
    if (egg.opacity > 0) requestAnimationFrame(pop);
  }
  pop();

  if (score >= TOTAL) setTimeout(endGame, 600);
}

// ── Render loop ──────────────────────────────────────────
function loop(ts) {
  ctx.clearRect(0, 0, W, H);
  const t = ts / 1000;

  // Draw radar hint arrows at bottom for off-screen eggs
  drawRadar();

  for (let egg of eggs) {
    if (egg.opacity <= 0) continue;
    const p = project(egg);
    if (!p) continue;
    drawEgg(egg, p.sx, p.sy, p.sizeFactor, t);
  }

  requestAnimationFrame(loop);
}

function drawRadar() {
  const FOV_V = FOV_H * (H / W);
  eggs.forEach(egg => {
    if (egg.collected) return;
    let dYaw = egg.yaw - yaw;
    if (dYaw >  180) dYaw -= 360;
    if (dYaw < -180) dYaw += 360;
    const dPitch = egg.pitch - pitch;
    if (Math.abs(dYaw) <= FOV_H && Math.abs(dPitch) <= FOV_V) return;

    // Draw arrow on edge pointing toward egg
    const angle = Math.atan2(-dPitch, dYaw);
    const margin = 40;
    const ax = W/2 + Math.cos(angle) * (W/2 - margin);
    const ay = H/2 + Math.sin(angle) * (H/2 - margin);
    const clamped_x = Math.max(margin, Math.min(W-margin, ax));
    const clamped_y = Math.max(margin+60, Math.min(H-margin, ay));

    ctx.save();
    ctx.translate(clamped_x, clamped_y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(14, 0); ctx.lineTo(-8, 9); ctx.lineTo(-8, -9);
    ctx.closePath();
    ctx.fillStyle = egg.color;
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1.5;
    ctx.fill(); ctx.stroke();
    ctx.restore();
  });
}

// ── Toast ────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = 1;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.opacity = 0, 900);
}

// ── Timer ────────────────────────────────────────────────
function tick() {
  timeLeft--;
  document.getElementById('timeEl').textContent = timeLeft;
  if (timeLeft <= 10) document.getElementById('timerEl').classList.add('urgent');
  if (timeLeft <= 0) endGame();
}

// ── Game flow ────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click', async () => {
  await startCamera();
  requestGyro();
  document.getElementById('splash').style.display = 'none';
  beginGame();
});

document.getElementById('gyroBtn').addEventListener('click', requestGyro);

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('endScreen').style.display = 'none';
  beginGame();
});

// Tap anywhere on screen to collect
document.addEventListener('click', e => {
  if (!gameActive) return;
  hitTest();
});

function beginGame() {
  score = 0; timeLeft = GAME_SECS; gameActive = true;
  document.getElementById('scoreEl').textContent = 0;
  document.getElementById('timeEl').textContent  = GAME_SECS;
  document.getElementById('timerEl').classList.remove('urgent');
  spawnEggs();
  clearInterval(timerInt);
  timerInt = setInterval(tick, 1000);
}

function endGame() {
  clearInterval(timerInt);
  gameActive = false;
  document.getElementById('finalScore').textContent = `${score} / ${TOTAL}`;
  const msgs = score===TOTAL ? '🎊 Perfect score! Amazing!' :
               score >= 7    ? '🌟 Great job, egg hunter!' :
               score >= 4    ? '🐣 Not bad — keep looking!' :
                               '🔍 They were sneaky this time!';
  document.getElementById('endMsg').textContent = msgs;
  document.getElementById('endScreen').style.display = 'flex';
}

// iOS 13+ gyro permission prompt
if (typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission === 'function') {
  document.getElementById('gyroBtn').style.display = 'block';
}

requestAnimationFrame(loop);
</script>
</body>
</html>
