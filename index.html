<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>🥚 AR Easter Egg Hunt</title>
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; font-family:Arial,sans-serif; }

#hud {
  position:fixed; top:0; left:0; right:0; z-index:999;
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.5),transparent);
  pointer-events:none;
}
.pill {
  background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.4);
  border-radius:999px; padding:7px 18px; color:#fff;
  font-size:18px; font-weight:bold; backdrop-filter:blur(6px);
  text-shadow:0 1px 3px rgba(0,0,0,0.5);
}
#timerEl.urgent { border-color:#ff4444; color:#ff8888; animation:blink .5s infinite alternate; }
@keyframes blink { to { opacity:.4; } }

#toast {
  position:fixed; top:42%; left:50%; transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.93); border-radius:20px;
  padding:12px 28px; font-size:24px; font-weight:bold; color:#333;
  z-index:1000; pointer-events:none; opacity:0; transition:opacity .25s;
}

/* Splash */
#splash {
  position:fixed; inset:0; z-index:2000;
  background:linear-gradient(135deg,#a8edea,#fed6e3);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; text-align:center; padding:28px;
}
#splash h1 { font-size:32px; color:#444; }
#splash p  { font-size:15px; color:#666; max-width:300px; line-height:1.6; }
.big { font-size:52px; }
#startBtn {
  margin-top:8px;
  background:linear-gradient(135deg,#f093fb,#f5576c);
  color:#fff; border:none; border-radius:30px;
  padding:16px 44px; font-size:20px; font-weight:bold; cursor:pointer;
  box-shadow:0 4px 15px rgba(245,87,108,.4);
}
#markerBtn {
  background:rgba(255,255,255,0.4); border:2px solid rgba(0,0,0,0.15);
  border-radius:30px; padding:12px 32px; font-size:16px;
  font-weight:bold; cursor:pointer; color:#555;
}

/* Marker sheet */
#markerSheet {
  position:fixed; inset:0; z-index:3000;
  background:#fff; overflow-y:auto;
  display:none; flex-direction:column; align-items:center;
  padding:20px; gap:20px;
}
#markerSheet h2 { font-size:22px; color:#333; margin-top:10px; }
#markerSheet p  { font-size:13px; color:#666; text-align:center; max-width:320px; }
.marker-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:16px; width:100%; max-width:360px;
}
.marker-card {
  border:3px solid #333; border-radius:12px;
  overflow:hidden; display:flex; flex-direction:column;
  align-items:center; background:#fafafa;
}
.marker-card canvas { width:100%; aspect-ratio:1; }
.marker-label {
  font-size:13px; font-weight:bold; color:#444;
  padding:6px; text-align:center;
}
#closeSheet {
  background:linear-gradient(135deg,#f093fb,#f5576c);
  color:#fff; border:none; border-radius:30px;
  padding:14px 40px; font-size:18px; font-weight:bold; cursor:pointer;
  margin-bottom:20px;
}

/* End screen */
#endScreen {
  position:fixed; inset:0; z-index:2000;
  background:linear-gradient(135deg,#a8edea,#fed6e3);
  display:none; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; text-align:center; padding:28px;
}
#endScreen h1 { font-size:32px; color:#444; }
#finalScore   { font-size:64px; font-weight:bold; color:#f5576c; }
#endMsg       { font-size:16px; color:#666; }
#restartBtn {
  background:linear-gradient(135deg,#43e97b,#38f9d7);
  color:#fff; border:none; border-radius:30px;
  padding:16px 44px; font-size:20px; font-weight:bold; cursor:pointer;
}
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="big">🥚🐰🌸</div>
  <h1>AR Easter Egg Hunt</h1>
  <p>Print or draw the <strong>marker sheets</strong>, hide them around your house, then point your camera at them to reveal eggs!</p>
  <button id="markerBtn">📄 Show Marker Sheets</button>
  <button id="startBtn">Start Hunt 🐰</button>
</div>

<!-- Marker Sheet -->
<div id="markerSheet">
  <h2>🖨️ Your Egg Markers</h2>
  <p>Print these out or draw them on paper (at least 3 inches wide). Hide them around your house!</p>
  <div class="marker-grid" id="markerGrid"></div>
  <button id="closeSheet">Done — Let's Hunt! 🥚</button>
</div>

<!-- End Screen -->
<div id="endScreen">
  <div class="big">🏆</div>
  <h1>Time's Up!</h1>
  <div id="finalScore">0 / 2</div>
  <div id="endMsg"></div>
  <button id="restartBtn">Play Again 🥚</button>
</div>

<!-- HUD -->
<div id="hud">
  <div class="pill">🥚 <span id="scoreEl">0</span>/<span id="totalEl">2</span></div>
  <div class="pill" id="timerEl">⏱ <span id="timeEl">60</span>s</div>
</div>

<div id="toast"></div>

<!-- AR Scene -->
<a-scene
  id="arScene"
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true; antialias: true;"
  style="display:none">

  <!-- EGG 1: Hiro marker -->
  <a-marker id="marker-hiro" preset="hiro">
    <a-entity id="egg-hiro" position="0 0.5 0" visible="true">
      <a-sphere
        color="#FF6B6B"
        radius="0.4"
        scale="1 1.35 1"
        segments-height="16" segments-width="16">
      </a-sphere>
      <a-torus
        color="white"
        radius="0.32"
        radius-tubular="0.06"
        rotation="90 0 0"
        opacity="0.7">
      </a-torus>
      <a-sphere color="white" radius="0.07" position="0.22 0.15 0.28"></a-sphere>
      <a-sphere color="white" radius="0.05" position="-0.18 0.3 0.28"></a-sphere>
      <a-animation attribute="position" to="0 0.75 0" direction="alternate" dur="1000" repeat="indefinite" easing="easeInOutSine"></a-animation>
    </a-entity>
  </a-marker>

  <!-- EGG 2: Kanji marker -->
  <a-marker id="marker-kanji" preset="kanji">
    <a-entity id="egg-kanji" position="0 0.5 0" visible="true">
      <a-sphere
        color="#FFD93D"
        radius="0.4"
        scale="1 1.35 1"
        segments-height="16" segments-width="16">
      </a-sphere>
      <a-torus
        color="#FF6B6B"
        radius="0.32"
        radius-tubular="0.06"
        rotation="90 0 0"
        opacity="0.7">
      </a-torus>
      <a-sphere color="white" radius="0.07" position="0.22 0.15 0.28"></a-sphere>
      <a-sphere color="white" radius="0.05" position="-0.18 0.3 0.28"></a-sphere>
      <a-animation attribute="position" to="0 0.75 0" direction="alternate" dur="1200" repeat="indefinite" easing="easeInOutSine"></a-animation>
    </a-entity>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
// ── Marker drawings (simplified, drawable by hand) ────────────────────────
const MARKERS = [
  { name: 'Egg 1 — HIRO marker', desc: 'Print from arjs.com/hiro', preset:'hiro',  color:'#FF6B6B', draw: drawHiro  },
  { name: 'Egg 2 — KANJI marker', desc: 'Print from arjs.com/kanji', preset:'kanji', color:'#FFD93D', draw: drawKanji },
];
const TOTAL = MARKERS.length;

const MSGS = ['🎉 Found one!','✨ Nice!','🐰 Got it!','🌟 Yes!','💛 Sweet!'];

let score = 0, timeLeft = 60, timerInt, gameActive = false;
let collected = {};

// ── Draw marker previews ─────────────────────────────────────────────────
function drawHiro(ctx, size) {
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,size,size);
  ctx.fillStyle = '#000';
  const b = size * 0.12;
  ctx.fillRect(0,0,size,b); ctx.fillRect(0,size-b,size,b);
  ctx.fillRect(0,0,b,size); ctx.fillRect(size-b,0,b,size);
  ctx.font = `bold ${size*0.18}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('HIRO', size/2, size*0.38);
  ctx.font = `${size*0.1}px Arial`;
  ctx.fillText('ar-js-org.github.io', size/2, size*0.58);
  ctx.fillText('/AR.js/three.js/examples/', size/2, size*0.68);
  ctx.fillText('marker-training/', size/2, size*0.77);
  ctx.font = `bold ${size*0.1}px Arial`;
  ctx.fillStyle = '#e00';
  ctx.fillText('Print: bit.ly/hiro-ar', size/2, size*0.88);
}

function drawKanji(ctx, size) {
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,size,size);
  ctx.fillStyle = '#000';
  const b = size * 0.12;
  ctx.fillRect(0,0,size,b); ctx.fillRect(0,size-b,size,b);
  ctx.fillRect(0,0,b,size); ctx.fillRect(size-b,0,b,size);
  ctx.font = `bold ${size*0.18}px Arial`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('KANJI', size/2, size*0.38);
  ctx.font = `${size*0.1}px Arial`;
  ctx.fillText('ar-js-org.github.io', size/2, size*0.58);
  ctx.fillText('/AR.js/three.js/examples/', size/2, size*0.68);
  ctx.fillText('marker-training/', size/2, size*0.77);
  ctx.font = `bold ${size*0.1}px Arial`;
  ctx.fillStyle = '#e00';
  ctx.fillText('Print: bit.ly/kanji-ar', size/2, size*0.88);
}

function buildMarkerSheet() {
  const grid = document.getElementById('markerGrid');
  grid.innerHTML = '';
  MARKERS.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'marker-card';
    const cv = document.createElement('canvas');
    cv.width = cv.height = 300;
    m.draw(cv.getContext('2d'), 300);
    const dot = document.createElement('div');
    dot.style.cssText = `width:18px;height:18px;border-radius:50%;background:${m.color};display:inline-block;margin-right:6px;vertical-align:middle;`;
    const lbl = document.createElement('div');
    lbl.className = 'marker-label';
    lbl.appendChild(dot);
    lbl.appendChild(document.createTextNode(m.name));
    card.appendChild(cv); card.appendChild(lbl);
    grid.appendChild(card);
  });
}

// ── UI buttons ────────────────────────────────────────────────────────────
document.getElementById('markerBtn').addEventListener('click', () => {
  buildMarkerSheet();
  document.getElementById('markerSheet').style.display = 'flex';
});
document.getElementById('closeSheet').addEventListener('click', () => {
  document.getElementById('markerSheet').style.display = 'none';
});

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('arScene').style.display = 'block';
  document.getElementById('totalEl').textContent = TOTAL;
  beginGame();
});

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('endScreen').style.display = 'none';
  collected = {};
  score = 0;
  document.getElementById('scoreEl').textContent = 0;
  beginGame();
});

// ── Game ──────────────────────────────────────────────────────────────────
function beginGame() {
  score = 0; timeLeft = 60; gameActive = true; collected = {};
  document.getElementById('scoreEl').textContent = 0;
  document.getElementById('timeEl').textContent = 60;
  document.getElementById('timerEl').classList.remove('urgent');
  // Reset egg visibility
  MARKERS.forEach(m => {
    const egg = document.getElementById(`egg-${m.preset}`);
    if (egg) {
      egg.setAttribute('visible', 'true');
      egg.removeAttribute('animation__collect');
      egg.setAttribute('scale', '1 1 1');
    }
  });
  clearInterval(timerInt);
  timerInt = setInterval(tick, 1000);
  setupMarkerListeners();
}

function setupMarkerListeners() {
  MARKERS.forEach((m, i) => {
    const marker = document.getElementById(`marker-${m.preset}`);
    if (!marker) return;
    // Remove old listeners by cloning
    const newMarker = marker.cloneNode(true);
    marker.parentNode.replaceChild(newMarker, marker);
    newMarker.addEventListener('markerFound', () => {
      if (!gameActive || collected[i]) return;
      collected[i] = true;
      score++;
      document.getElementById('scoreEl').textContent = score;
      showToast(MSGS[Math.floor(Math.random()*MSGS.length)]);
      const egg = document.getElementById(`egg-${m.preset}`);
      if (egg) {
        egg.setAttribute('animation__collect',
          'property: scale; to: 2 2 2; dur: 300; easing: easeOutQuad');
        setTimeout(() => egg.setAttribute('visible','false'), 400);
      }
      if (score >= TOTAL) setTimeout(endGame, 800);
    });
  });
}

function tick() {
  timeLeft--;
  document.getElementById('timeEl').textContent = timeLeft;
  if (timeLeft <= 10) document.getElementById('timerEl').classList.add('urgent');
  if (timeLeft <= 0) endGame();
}

function endGame() {
  clearInterval(timerInt);
  gameActive = false;
  document.getElementById('finalScore').textContent = `${score} / ${TOTAL}`;
  const msg = score===TOTAL ? '🎊 You found them all!' :
              score===1     ? '🐣 Found 1 — try again!' :
                              '🔍 Keep searching!';
  document.getElementById('endMsg').textContent = msg;
  document.getElementById('endScreen').style.display = 'flex';
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.opacity = 1;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.opacity = 0, 1000);
}
</script>
</body>
</html>
